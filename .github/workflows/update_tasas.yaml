name: Actualizar Tasas BCV

on:
  schedule:
    # Horario: lunes a viernes, de 4:00 PM a 8:00 PM (hora Venezuela, VET = UTC-4)
    # En UTC: de 20:00 a 00:00 (siguiente día UTC)
    # Cada 30 minutos dentro de esa ventana horaria:
    - cron: '0 20 * * 1-5'   # 4:00 PM VET
    - cron: '30 20 * * 1-5'  # 4:30 PM VET
    - cron: '0 21 * * 1-5'   # 5:00 PM VET
    - cron: '30 21 * * 1-5'  # 5:30 PM VET
    - cron: '0 22 * * 1-5'   # 6:00 PM VET
    - cron: '30 22 * * 1-5'  # 6:30 PM VET
    - cron: '0 23 * * 1-5'   # 7:00 PM VET
    - cron: '30 23 * * 1-5'  # 7:30 PM VET
    - cron: '0 0 * * 2-6'    # 8:00 PM VET (ya es martes–sábado en UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install requests beautifulsoup4

      - name: Ejecutar script
        id: ejecutar
        run: |
          python actualizar_tasas.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Subir cambios
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          # Solo hace commit si hay archivos nuevos o modificados
          if ! git diff --cached --exit-code; then
            git commit -m "Auto: Actualizacion tasas ${{ github.run_id }}"
            git push
          else
            echo "Sin cambios: las tasas de hoy ya estaban registradas o no hay datos nuevos."
          fi